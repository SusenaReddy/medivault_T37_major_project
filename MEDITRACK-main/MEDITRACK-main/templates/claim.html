<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insurance Claim</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f3f0fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.claim-card{
    background:#ddd5f3;
    width:420px;
    padding:30px;
    border-radius:15px;
}

h2{
    text-align:center;
    color:#2e1a6e;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    font-weight:600;
    font-size:13px;
    margin-bottom:5px;
    color:#5a3fa8;
}

input, textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #c3b4f0;
    font-size:14px;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:12px;
    background:#7c5cbf;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#5e42a3;
}

</style>
</head>

<body>

<div class="claim-card">

<h2>Insurance Claim Request</h2>

<form method="POST">

<div class="form-group">
<label>Insurance Provider</label>
<input type="text" value="{{ provider.ProviderName }}" readonly>
</div>

<div class="form-group">
<label>Hospital Name</label>
<input type="text" name="hospital" required>
</div>

<div class="form-group">
<label>Treatment Date</label>
<input type="date" name="treatment_date" required>
</div>

<div class="form-group">
<label>Claim Amount</label>
<input type="number" name="amount" required>
</div>

<div class="form-group">
<label>Reason for Claim</label>
<textarea name="reason" rows="4" required></textarea>
</div>

<div class="form-group">
<label>Upload Medical Bill</label>
<input type="file" name="document">
</div>

<button type="submit">Submit Claim</button>

</form>

</div>

</body>
</html>
