<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #ddd5f3;
      --primary-dark: #b9aedb;
      --primary-light: #ebe7f8;
      --accent: #9685cf;
      --text-dark: #3a3a3a;
      --text-light: #757575;
      --white: #ffffff;
      --background: #ddd5f3; /* Changed from #f8f7fc to #ddd5f3 */
      --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      --card-hover: 0 10px 25px rgba(221, 213, 243, 0.2);
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--background);
      color: var(--text-dark);
    }
    
    .container {
      max-width: 800px;
      background-color: var(--white);
      border-radius: 15px;
      box-shadow: var(--card-shadow);
      padding: 30px;
      margin-top: 30px;
      margin-bottom: 50px;
    }
    
    h2 {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 30px;
      position: relative;
      padding-bottom: 10px;
    }
    
    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background-color: var(--primary);
    }
    
    .form-label {
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    
    .form-control, .form-select {
      border: 1px solid var(--primary-light);
      border-radius: 8px;
      padding: 10px 15px;
      transition: all 0.3s ease;
    }
    
    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 0.25rem rgba(150, 133, 207, 0.25);
    }
    
    .btn-success {
      background-color: var(--accent);
      border-color: var(--accent);
      padding: 12px 30px;
      font-weight: 500;
      border-radius: 8px;
      margin-top: 20px;
      transition: all 0.3s ease;
    }
    
    .btn-success:hover {
      background-color: var(--primary-dark);
      border-color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(150, 133, 207, 0.3);
    }
    
    .form-check-input:checked {
      background-color: var(--accent);
      border-color: var(--accent);
    }
    
    .form-switch .form-check-input {
      width: 3em;
      height: 1.5em;
    }
    
    .invalid-feedback {
      color: #e74c3c;
    }
    
    .was-validated .form-control:invalid, 
    .was-validated .form-select:invalid {
      border-color: #e74c3c;
    }
    
    .was-validated .form-control:valid, 
    .was-validated .form-select:valid {
      border-color: var(--primary);
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 20px;
        margin-top: 20px;
      }
      
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container my-5">
    <h2 class="text-center mb-4">Book a Diagnostic Test</h2>
    <form class="row g-3 needs-validation" novalidate>
      
      <!-- Patient Name -->
      <div class="col-md-6">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" required>
        <div class="invalid-feedback">Please enter your name.</div>
      </div>

      <!-- Phone Number -->
      <div class="col-md-6">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" pattern="[0-9]{10}" required>
        <div class="invalid-feedback">Please enter a valid 10-digit phone number.</div>
      </div>

      <!-- Email -->
      <div class="col-md-6">
        <label for="email" class="form-label">Email (optional)</label>
        <input type="email" class="form-control" id="email">
      </div>

      <!-- Select Center -->
      <div class="col-md-6">
        <label for="center" class="form-label">Diagnostic Center</label>
        <select class="form-select" id="center" required>
          <option selected disabled value="">Choose...</option>
          <option>City Lab Diagnostics</option>
          <option>Wellness Path Labs</option>
          <option>Precision Health Labs</option>
        </select>
        <div class="invalid-feedback">Please select a diagnostic center.</div>
      </div>

      <!-- Test Type -->
      <div class="col-md-6">
        <label for="testType" class="form-label">Test Type</label>
        <select class="form-select" id="testType" required>
          <option selected disabled value="">Choose...</option>
          <option>Blood Test</option>
          <option>Full Body Checkup</option>
          <option>Thyroid Test</option>
          <option>COVID-19 Test</option>
          <option>Other</option>
        </select>
        <div class="invalid-feedback">Please select a test type.</div>
      </div>

      <!-- Date -->
      <div class="col-md-6">
        <label for="date" class="form-label">Preferred Date</label>
        <input type="date" class="form-control" id="date" required>
        <div class="invalid-feedback">Please select a date.</div>
      </div>

      <!-- Time -->
      <div class="col-md-6">
        <label for="time" class="form-label">Preferred Time</label>
        <input type="time" class="form-control" id="time" required>
        <div class="invalid-feedback">Please select a time.</div>
      </div>

      <!-- Home Collection Toggle -->
      <div class="col-md-6">
        <label class="form-label">Home Sample Collection</label>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="homeCollection">
          <label class="form-check-label" for="homeCollection">Yes, I want home collection</label>
        </div>
      </div>

      <!-- Additional Notes -->
      <div class="col-12">
        <label for="notes" class="form-label">Additional Notes (optional)</label>
        <textarea class="form-control" id="notes" rows="3"></textarea>
      </div>

      <!-- Submit Button -->
      <div class="col-12 text-center">
        <button class="btn btn-success btn-lg" type="submit">
          <i class="fas fa-calendar-check me-2"></i>Submit Booking
        </button>
      </div>

    </form>
  </div>

  <!-- Bootstrap JS & Form Validation -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Bootstrap form validation
    (() => {
      'use strict';
      const forms = document.querySelectorAll('.needs-validation');
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          }
          form.classList.add('was-validated');
        }, false);
      });
      
      // Set minimum date to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').min = today;
    })();
  </script>
</body>
</html>
