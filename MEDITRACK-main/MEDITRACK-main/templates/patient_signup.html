<body>
  <header class="header">
    <h1>MediTrack</h1>
    <div class="nav-links">
      <div class="dropdown">
        <a href="#">Login</a>
        <div class="dropdown-content">
          <a href="#" onclick="navigateTo('patient_login.html')">Patient</a>
          <a href="#" onclick="navigateTo('doctor_login.html')">Doctor</a>
        </div>
      </div>
      <div class="dropdown">
        <a href="#">Sign Up</a>
        <div class="dropdown-content">
          <a href="#" onclick="navigateTo('patient_signup.html')">Patient</a>
          <a href="#" onclick="navigateTo('doctor_signup.html')">Doctor</a>
        </div>
      </div>
    </div>
  </header>

  <div class="main-container">
    <div class="image-container">
      <img src="https://static.vecteezy.com/system/resources/previews/024/760/222/non_2x/patient-with-doctor-and-nurse-ai-generated-free-png.png" />
      <h2>MediTrack</h2>
      <p>Make your Appointments easier</p>
    </div>

    <div class="signup-container">
      <h2>Patient Signup</h2>
      <form action="/patient_signup" method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required />
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
        <label for="firstname">First Name</label>
        <input type="text" id="firstname" name="firstname" required />

        <label for="lastname">Last Name</label>
        <input type="text" id="lastname" name="lastname" required />

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" />

        <label for="gender">Gender</label>
        <select id="gender" name="gender">
          <option value="">Select</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>

        <label for="address">Address</label>
        <input type="text" id="address" name="address" />

        <label for="phonenumber">Phone Number</label>
        <input type="text" id="phonenumber" name="phonenumber" required />

        <label for="insurance">Insurance Provider ID</label>
        <input type="number" id="insurance" name="insurance" />

        <button type="submit">Sign Up</button>
      </form>
    </div>
  </div>
</body>
<script>
document.querySelector('form').addEventListener('submit', async (event) => {
    event.preventDefault();

    const formData = {
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        firstname: document.getElementById('firstname').value,
        lastname: document.getElementById('lastname').value,
        dob: document.getElementById('dob').value,
        gender: document.getElementById('gender').value,
        address: document.getElementById('address').value,
        phonenumber: document.getElementById('phonenumber').value,
        insurance: document.getElementById('insurance').value,
    };

    try {
        const response = await fetch('/patient_signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });

        const result = await (response.headers.get("content-type")?.includes("application/json")
            ? response.json()
            : Promise.reject(new Error("Non-JSON response")));

        if (response.ok) {
            alert(result.message || 'Signup successful!');
            window.location.href = '/patient_dashboard';  // redirect to patient dashboard
        } else {
            alert('Signup failed: ' + (result.error || 'Unknown error'));
        }
    } catch (error) {
        alert('Network error: ' + error.message);
    }
});
</script>
